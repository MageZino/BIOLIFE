<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Compra | BioLife</title>
  <link href="assets/img/logo.png" rel="icon" type="image/png">

  <style>
    :root {
      --primary-color: #4CAF50;
      --bg-dark: #0a0a0a;
      --text-light: #f1f1f1;
      --surface-color: #101010;
      --surface-alt: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .checkout-container {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: row;
      background: var(--surface-alt);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }

    .left {
      flex: 1.2;
      padding: 40px;
      background: var(--surface-color);
    }

    .logo img {
      height: 50px;
      margin-bottom: 20px;
    }

    h2 {
      color: var(--primary-color);
      font-size: 1.3rem;
      margin: 25px 0 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0a0a0a;
      color: white;
      margin-bottom: 12px;
      font-size: 1rem;
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.2);
    }

    .row { display: flex; gap: 12px; }

    .right {
      flex: 0.8;
      padding: 40px;
      background: var(--surface-alt);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .produto-preview {
      width: 100%;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    .produto-preview img {
      width: 100%;
      display: block;
    }

    .order-summary {
      background: rgba(255,255,255,0.03);
      padding: 25px;
      border-radius: 15px;
    }

    .order-item, .order-total {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .order-total {
      color: var(--primary-color);
      font-weight: bold;
      font-size: 1.5rem;
      border-top: 1px solid #333;
      padding-top: 15px;
      margin-top: 5px;
    }

    .btn-confirmar {
      width: 100%;
      margin-top: 30px;
      padding: 18px;
      background: var(--primary-color);
      border: none;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
    }

    .btn-confirmar:hover:not(:disabled) {
      background: #45a049;
      transform: translateY(-2px);
    }

    .btn-confirmar:disabled { opacity: 0.6; cursor: not-allowed; }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .popup {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      border: 1px solid var(--primary-color);
    }

    #pix-code {
      display: block;
      background: #000;
      padding: 15px;
      margin: 15px 0;
      word-break: break-all;
      font-size: 0.8rem;
      border-radius: 10px;
      border: 1px dashed var(--primary-color);
      color: #ccc;
    }

    @media (max-width: 850px) {
      .checkout-container { flex-direction: column-reverse; }
      .left, .right { width: 100%; padding: 30px 20px; }
      .produto-preview { max-width: 200px; margin: 0 auto 20px; }
      .row { flex-direction: column; gap: 0; }
      .row input { width: 100% !important; }
    }
  </style>
</head>

<body>

<div class="checkout-container">
  <div class="left">
    <div class="logo"><img src="assets/img/logo.png"></div>
    <h2>Seus Dados</h2>
    <input id="nome" placeholder="Nome Completo">
    <input id="email" placeholder="E-mail">
    <div class="row">
      <input id="telefone" placeholder="Telefone">
      <input id="cpf" placeholder="CPF">
    </div>
    <h2>Entrega</h2>
    <input id="cep" placeholder="CEP" onblur="buscaCEP(this.value)">
    <div class="row">
      <input id="rua" placeholder="Endereço">
      <input id="numero" placeholder="Nº" style="width: 30%;">
    </div>
    <input id="bairro" placeholder="Bairro">
    <div class="row">
      <input id="cidade" placeholder="Cidade">
      <input id="estado" placeholder="UF" maxlength="2" style="width: 30%;">
    </div>
    <button class="btn-confirmar" id="btnConfirmar">Gerar PIX para Pagar</button>
  </div>

  <div class="right">
    <div class="produto-preview">
      <img id="produto-img">
    </div>
    <div class="order-summary">
      <div class="order-item"><span>Item selecionado</span><span id="produto-preco">...</span></div>
      <div class="order-total"><span>Total a Pagar</span><span id="total-preco">...</span></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="popup">
    <h3 style="color: var(--primary-color); margin-bottom: 15px;">Quase lá!</h3>
    <p style="font-size: 0.9rem; margin-bottom: 20px;">Aponte a câmera do seu banco para o QR Code abaixo:</p>
    <img id="qr-code-img" src="" alt="QR Code Pix" style="width: 100%; max-width: 250px; background: white; padding: 10px; border-radius: 10px;" />
    <p style="margin-top: 20px; font-size: 0.85rem;">Ou use o Pix Copia e Cola:</p>
    <code id="pix-code"></code>
    <button class="btn-confirmar" onclick="document.getElementById('overlay').style.display='none'">Fechar</button>
  </div>
</div>

<script>
window.onload = () => {
  const produto = JSON.parse(localStorage.getItem('produtoSelecionado'));
  if (produto) {
    document.getElementById('produto-img').src = produto.imagem;
    const precoNum = parseFloat(produto.preco);
    document.getElementById('produto-preco').textContent = 'R$ ' + precoNum.toFixed(2);
    document.getElementById('total-preco').textContent = 'R$ ' + precoNum.toFixed(2);
  }
};

async function buscaCEP(cep) {
  const cleanCEP = cep.replace(/\D/g, "");
  if (cleanCEP.length === 8) {
    try {
      const res = await fetch(`https://viacep.com.br/ws/${cleanCEP}/json/`);
      const data = await res.json();
      if (!data.erro) {
        document.getElementById('rua').value = data.logradouro;
        document.getElementById('bairro').value = data.bairro;
        document.getElementById('cidade').value = data.localidade;
        document.getElementById('estado').value = data.uf;
        document.getElementById('numero').focus();
      }
    } catch (e) { console.error("Erro CEP"); }
  }
}

document.getElementById('btnConfirmar').onclick = async () => {
  const btn = document.getElementById('btnConfirmar');
  const produto = JSON.parse(localStorage.getItem('produtoSelecionado'));

  const dadosForm = {
    nome: document.getElementById('nome').value,
    email: document.getElementById('email').value,
    telefone: document.getElementById('telefone').value,
    cpf: document.getElementById('cpf').value,
    cep: document.getElementById('cep').value,
    rua: document.getElementById('rua').value,
    numero: document.getElementById('numero').value,
    bairro: document.getElementById('bairro').value,
    cidade: document.getElementById('cidade').value,
    estado: document.getElementById('estado').value,
    nomeProduto: produto ? produto.nome : "Suplemento",
    preco: produto ? produto.preco : 0
  };

  if (!dadosForm.cpf || !dadosForm.cep || !dadosForm.numero || !dadosForm.nome) {
    alert("Por favor, preencha os campos obrigatórios.");
    return;
  }

  btn.innerText = "Processando...";
  btn.disabled = true;

  try {
    const response = await fetch('/api/create-pix', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(dadosForm)
    });

    const data = await response.json();
    const qrImage = data.qr_code_base64 || (data.encodedImage ? `data:image/png;base64,${data.encodedImage}` : null);
    
    if (qrImage && data.payload) {
      document.getElementById('qr-code-img').src = qrImage;
      document.getElementById('pix-code').textContent = data.payload;
      document.getElementById('overlay').style.display = 'flex';
    } else {
      alert("Erro ao gerar PIX: " + (data.detalhes || "Dados incompletos."));
    }
  } catch (error) {
    alert("Erro de conexão.");
  } finally {
    btn.innerText = "Gerar PIX para Pagar";
    btn.disabled = false;
  }
};
</script>

</body>
</html>
