<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de Pagamento - BioLife</title>
  <link href="assets/img/logo.png" rel="icon" type="image/png">

  <style>
    :root {
      --primary-color: #4CAF50;
      --bg-dark: #0a0a0a;
      --text-light: #f1f1f1;
      --surface-color: #101010;
      --surface-alt: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px;
    }

    .checkout-container {
      width: 1100px;
      display: flex;
      background: var(--surface-alt);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    }

    .left {
      width: 45%;
      padding: 40px;
      background: var(--surface-color);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .logo img {
      width: 130px;
      margin-bottom: 25px;
    }

    h2 {
      color: var(--primary-color);
      font-size: 1.4rem;
      margin: 20px 0 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: white;
      margin-bottom: 10px;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .row { display: flex; gap: 10px; }

    .right {
      width: 55%;
      padding: 40px;
    }

    .produto {
      height: 250px;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .produto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .order-summary {
      background: var(--surface-color);
      padding: 20px;
      border-radius: 10px;
    }

    .order-item, .order-total {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .order-total {
      color: var(--primary-color);
      font-weight: bold;
      font-size: 1.2rem;
      border-top: 1px solid #333;
      padding-top: 10px;
    }

    .btn-confirmar {
      margin-top: 20px;
      padding: 15px;
      background: var(--primary-color);
      border: none;
      border-radius: 25px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-confirmar:hover {
      background: #45a049;
      transform: scale(1.02);
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .popup {
      background: #111;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 400px;
      position: relative;
    }

    .close-popup {
      position: absolute;
      top: 10px; right: 15px;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    #pix-code {
      display: block;
      background: #222;
      padding: 10px;
      margin-top: 10px;
      word-break: break-all;
      font-size: 0.8rem;
      border-radius: 5px;
      border: 1px dashed var(--primary-color);
    }
  </style>
</head>

<body>

<div class="checkout-container">
  <div class="left">
    <div class="logo"><img src="assets/img/logo.png"></div>

    <h2>Contato</h2>
    <input id="nome" placeholder="Nome Completo">
    <input id="email" placeholder="Email">
    <div class="row">
      <input id="telefone" placeholder="Telefone (DDD + Número)">
      <input id="cpf" placeholder="CPF (apenas números)">
    </div>

    <h2>Endereço de Entrega</h2>
    <input id="cep" placeholder="CEP" onblur="buscaCEP(this.value)">
    <div class="row">
      <input id="rua" placeholder="Rua">
      <input id="numero" placeholder="Nº" style="width: 30%;">
    </div>
    <input id="bairro" placeholder="Bairro">
    <div class="row">
      <input id="cidade" placeholder="Cidade">
      <input id="estado" placeholder="UF" maxlength="2" style="width: 30%;">
    </div>

    <button class="btn-confirmar" id="btnConfirmar">Pagar com PIX</button>
  </div>

  <div class="right">
    <div class="produto">
      <img id="produto-img">
    </div>

    <div class="order-summary">
      <div class="order-item">
        <span>Produto</span>
        <span id="produto-preco"></span>
      </div>

      <div class="order-total">
        <span>Total</span>
        <span id="total-preco"></span>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="popup">
    <span class="close-popup" onclick="document.getElementById('overlay').style.display='none'">&times;</span>
    <h3 style="margin-bottom: 20px;">Pagamento via PIX</h3>
    <img id="qr-code-img" src="" alt="QR Code Pix" style="width: 250px; height: 250px; background: white; padding: 10px; border-radius: 10px;" />
    <p style="margin-top: 15px; font-size: 0.9rem;">Copia e Cola:</p>
    <strong id="pix-code"></strong>
    <button class="btn-confirmar" style="width: 100%; margin-top: 15px;" onclick="document.getElementById('overlay').style.display='none'">Já paguei</button>
  </div>
</div>

<script>
window.onload = () => {
  const produto = JSON.parse(localStorage.getItem('produtoSelecionado'));
  if (produto) {
    document.getElementById('produto-img').src = produto.imagem;
    // Garante que o preço seja tratado como número para o .toFixed
    const precoNum = parseFloat(produto.preco);
    document.getElementById('produto-preco').textContent = 'R$ ' + precoNum.toFixed(2);
    document.getElementById('total-preco').textContent = 'R$ ' + precoNum.toFixed(2);
  }
};

async function buscaCEP(cep) {
  const cleanCEP = cep.replace(/\D/g, "");
  if (cleanCEP.length === 8) {
    try {
      const res = await fetch(`https://viacep.com.br/ws/${cleanCEP}/json/`);
      const data = await res.json();
      if (!data.erro) {
        document.getElementById('rua').value = data.logradouro;
        document.getElementById('bairro').value = data.bairro;
        document.getElementById('cidade').value = data.localidade;
        document.getElementById('estado').value = data.uf;
        document.getElementById('numero').focus();
      } else {
        alert("CEP não encontrado.");
      }
    } catch (e) {
      console.error("Erro ao buscar CEP");
    }
  }
}

document.getElementById('btnConfirmar').onclick = async () => {
  const btn = document.getElementById('btnConfirmar');
  const produto = JSON.parse(localStorage.getItem('produtoSelecionado'));

  // 1. Pegando dados do formulário
  const dadosForm = {
    nome: document.getElementById('nome').value,
    email: document.getElementById('email').value,
    telefone: document.getElementById('telefone').value,
    cpf: document.getElementById('cpf').value,
    cep: document.getElementById('cep').value,
    rua: document.getElementById('rua').value,
    numero: document.getElementById('numero').value,
    bairro: document.getElementById('bairro').value,
    cidade: document.getElementById('cidade').value,
    estado: document.getElementById('estado').value,
    
    // --- ADICIONADO: Enviando dados do produto para o backend ---
    nomeProduto: produto ? produto.nome : "Produto BioLife",
    preco: produto ? produto.preco : 0
  };

  // Validação básica
  if (!dadosForm.cpf || !dadosForm.cep || !dadosForm.numero || !dadosForm.nome) {
    alert("Por favor, preencha todos os campos obrigatórios.");
    return;
  }

  btn.innerText = "Gerando QR Code...";
  btn.disabled = true;

  try {
    const response = await fetch('/api/create-pix', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(dadosForm)
    });

    const data = await response.json();

    if (data.qr_code_base64) {
      document.getElementById('qr-code-img').src = data.qr_code_base64;
      document.getElementById('pix-code').textContent = data.payload;
      document.getElementById('overlay').style.display = 'flex';
    } else {
      alert("Erro: " + (data.detalhes || "Verifique os dados digitados."));
    }
  } catch (error) {
    console.error("Erro:", error);
    alert("Erro na conexão. Verifique se a API está rodando.");
  } finally {
    btn.innerText = "Pagar com PIX";
    btn.disabled = false;
  }
};
</script>

</body>
</html>
